name: smartgrow9
description: SmartGrow crop detection app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.4
  image: ^4.1.3
  tflite_flutter: ^0.12.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.6
  connectivity_plus: ^6.0.5
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.0
  crypto: ^3.0.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - .env
